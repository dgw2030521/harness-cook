[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "harness-sdk"
version = "0.1.0"
description = "Universal Agent Harness SDK — Agent 决策执行，Harness 稳定约束"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "harness-cook contributors"},
]
keywords = ["agent", "harness", "compliance", "guardrails", "sdk", "ai-safety"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]

dependencies = [
    "pyyaml>=6.0",
    "harness-cook>=0.1.0",
]

[project.urls]
Homepage = "https://github.com/harness-cook/harness-cook"
Repository = "https://github.com/harness-cook/harness-cook"
Documentation = "https://github.com/harness-cook/harness-cook#readme"
"Bug Tracker" = "https://github.com/harness-cook/harness-cook/issues"
Changelog = "https://github.com/harness-cook/harness-cook/blob/master/CHANGELOG.md"

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["harness_sdk*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]