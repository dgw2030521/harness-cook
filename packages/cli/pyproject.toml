[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "harness-cli"
version = "0.1.0"
description = "CLI tool for harness-cook — Agent decision governance from terminal"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [{name = "harness-cook contributors"}]
keywords = ["cli", "agent", "harness", "governance", "mcp", "claude-code"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Build Tools",
]
dependencies = [
    "harness-cook>=0.1.0",
]

[project.urls]
Homepage = "https://github.com/harness-cook/harness-cook"
Repository = "https://github.com/harness-cook/harness-cook"
"Bug Tracker" = "https://github.com/harness-cook/harness-cook/issues"
Changelog = "https://github.com/harness-cook/harness-cook/blob/master/CHANGELOG.md"

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]

[project.scripts]
harness = "harness_cli:main"

[tool.setuptools]
py-modules = ["harness_cli"]
packages = ["cli_commands"]